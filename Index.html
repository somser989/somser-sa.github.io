*{margin:0;padding:0;box-sizing:border-box}

html{scroll-behavior:smooth}

.lang button{

-webkit-text-fill-color:transparent;

.hero p{
color:var(--dim);
margin-top:15px;
max-width:700px;
font-size:1.1rem;
line-height:1.7;

.btn{

padding:15px 40px;

transition:.4s;
}
.btn:hover{
transform:translateY(-4px);

}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:25px;
margin-top:50px;

.card{
background:var(--card);

.card:hover{

.card i{
